# ============================================
# Fraud Detection - Production Docker Compose
# Server: 10.14.190.28
# Port scheme: offset to avoid conflicts with drug_icd_mapping
# ============================================

services:
  # 1. PostgreSQL — Relational DB
  postgres:
    image: postgres:15-alpine
    container_name: fraud_prod_postgres
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-fraud_detection}
    volumes:
      - fraud_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-fraud_detection}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # 2. Neo4j — Graph DB (564k nodes)
  neo4j:
    image: neo4j:5.12.0
    container_name: fraud_prod_neo4j
    ports:
      - "17474:7474"
      - "17687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - fraud_neo4j_data:/data
      - fraud_neo4j_import:/var/lib/neo4j/import
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  # 3. Qdrant — Vector DB
  qdrant:
    image: qdrant/qdrant:v1.6.1
    container_name: fraud_prod_qdrant
    ports:
      - "16333:6333"
    volumes:
      - fraud_qdrant_data:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # 4. App — FastAPI Backend
  app:
    build:
      context: ../..
      dockerfile: deploy/fraud/Dockerfile.app
    container_name: fraud_prod_app
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-fraud_detection}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - QDRANT_URL=http://qdrant:6333
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - fraud_app_logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # 5. Dashboard — SIU Fraud Dashboard
  dashboard:
    build:
      context: ../..
      dockerfile: deploy/fraud/Dockerfile.dashboard
    container_name: fraud_prod_dashboard
    ports:
      - "5001:5000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - PYTHONUNBUFFERED=1
    depends_on:
      neo4j:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/overview')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  fraud_postgres_data:
  fraud_neo4j_data:
  fraud_neo4j_import:
  fraud_qdrant_data:
  fraud_app_logs:
