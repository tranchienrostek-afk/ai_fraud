version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: drug_icd_mapping_qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  web:
    build: .
    container_name: drug_icd_mapping_prod_web
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./app:/app/app
    env_file:
      - .env
    environment:
      - QDRANT_MODE=server
      - QDRANT_URL=http://qdrant:6333
      - DISABLE_MIGRATION=true
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
