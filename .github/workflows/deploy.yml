name: CI/CD Pipeline - Fraud Detection

on:
  push:
    branches: [main]
    paths:
      - "deep_research/dashboard/**"
      - "src/**"
      - "deploy/fraud/**"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch:
    inputs:
      skip_neo4j_check:
        description: "Skip Neo4j health check (first deploy)"
        type: boolean
        default: false

jobs:
  # ============================
  # STAGE 1: Deploy Full Stack
  # ============================
  deploy:
    name: Deploy Fraud Detection
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Services
        run: |
          export RUNNER_ALLOW_RUNASROOT=1
          export HOME=/root
          export COMPOSE_PROJECT_NAME=fraud_detection_prod

          APP_DIR="/root/workspace/fraud_detection"
          DEPLOY_DIR="$APP_DIR/deploy/fraud"
          COMPOSE_FILE="$DEPLOY_DIR/docker-compose.prod.yml"

          echo "=========================================="
          echo "  FRAUD DETECTION — DEPLOYMENT"
          echo "  $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=========================================="

          # Ensure directory exists
          mkdir -p "$APP_DIR"

          # Clone or pull
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "1. First deploy — cloning repo..."
            git clone https://github.com/tranchienrostek-afk/ai_fraud.git "$APP_DIR"
          else
            echo "1. Pulling latest code..."
            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
          fi

          cd "$APP_DIR"
          echo "  Commit: $(git log --oneline -1)"

          # Ensure .env.prod
          if [ ! -f "$DEPLOY_DIR/.env.prod" ]; then
            echo "  WARNING: .env.prod not found, using defaults"
          fi

          # Build & deploy all services
          echo "2. Building & Starting services..."
          docker compose -f "$COMPOSE_FILE" --env-file "$DEPLOY_DIR/.env.prod" down --remove-orphans 2>/dev/null || true
          docker compose -f "$COMPOSE_FILE" --env-file "$DEPLOY_DIR/.env.prod" up -d --build

          echo "3. Waiting 60s for all services to start..."
          sleep 60

          echo "  SERVICES DEPLOYED"
          docker compose -f "$COMPOSE_FILE" ps

      - name: Import Neo4j Dump (First Deploy Only)
        run: |
          export RUNNER_ALLOW_RUNASROOT=1
          export HOME=/root

          APP_DIR="/root/workspace/fraud_detection"
          DUMP_FILE="$APP_DIR/neo4j.dump"

          if [ -f "$DUMP_FILE" ]; then
            echo "Found neo4j.dump — importing..."

            # Stop neo4j for safe import
            docker stop fraud_prod_neo4j || true
            sleep 5

            docker run --rm \
              -v fraud_neo4j_data:/data \
              -v "$APP_DIR:/backup" \
              neo4j:5.12.0 \
              neo4j-admin database load neo4j --from-path=/backup/ --overwrite-destination=true

            # Restart neo4j
            docker start fraud_prod_neo4j
            sleep 30

            # Rename to avoid re-import
            mv "$DUMP_FILE" "$DUMP_FILE.imported.$(date +%Y%m%d)"
            echo "  Neo4j dump imported successfully"
          else
            echo "No neo4j.dump found, skipping import"
          fi

      - name: Health Check — Neo4j
        run: |
          export RUNNER_ALLOW_RUNASROOT=1

          echo "=========================================="
          echo "  HEALTH CHECKS"
          echo "=========================================="

          echo "1. Neo4j..."
          NEO4J_OK=false
          for i in {1..12}; do
            RESP=$(curl -s --max-time 5 http://localhost:17474 || echo "FAILED")
            if [[ "$RESP" != "FAILED" ]]; then
              NEO4J_OK=true
              echo "  Neo4j: OK (attempt $i)"
              break
            fi
            echo "  Waiting... ($i/12)"
            sleep 10
          done

          if [[ "$NEO4J_OK" != "true" ]] && [[ "${{ github.event.inputs.skip_neo4j_check }}" != "true" ]]; then
            echo "  Neo4j: FAILED after 120s"
            docker logs fraud_prod_neo4j --tail=30 || true
            exit 1
          fi

          # Verify node count
          echo "  Checking Neo4j data..."
          NODE_COUNT=$(docker exec fraud_prod_neo4j cypher-shell -u neo4j -p password "MATCH (n) RETURN count(n) AS cnt;" 2>/dev/null | tail -1 || echo "0")
          echo "  Node count: $NODE_COUNT"

      - name: Health Check — Dashboard
        run: |
          export RUNNER_ALLOW_RUNASROOT=1

          echo "2. Dashboard..."
          DASH_OK=false
          for i in {1..12}; do
            RESP=$(curl -s --max-time 10 http://localhost:5001/api/overview || echo "FAILED")
            if [[ "$RESP" != "FAILED" ]] && [[ "$RESP" == *"total_claims"* ]]; then
              DASH_OK=true
              echo "  Dashboard: OK"
              break
            fi
            echo "  Waiting... ($i/12)"
            sleep 10
          done

          if [[ "$DASH_OK" != "true" ]]; then
            echo "  Dashboard: FAILED"
            docker logs fraud_prod_dashboard --tail=30 || true
            exit 1
          fi

          # Verify audit rules
          echo "  Checking audit rules..."
          RULE_COUNT=$(curl -s http://localhost:5001/api/audit-rules | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "  Audit rules: $RULE_COUNT"

      - name: Health Check — App API & Others
        run: |
          export RUNNER_ALLOW_RUNASROOT=1

          echo "3. App API..."
          curl -sf --max-time 10 http://localhost:8002/docs > /dev/null 2>&1 && echo "  App API: OK" || echo "  App API: DEGRADED (may need data init)"

          echo "4. PostgreSQL..."
          docker exec fraud_prod_postgres pg_isready -U admin -d fraud_detection > /dev/null 2>&1 && echo "  PostgreSQL: OK" || echo "  PostgreSQL: FAILED"

          echo "5. Qdrant..."
          curl -sf --max-time 5 http://localhost:16333/healthz > /dev/null 2>&1 && echo "  Qdrant: OK" || echo "  Qdrant: DEGRADED"

      - name: Setup Neo4j Backup Cron
        run: |
          export RUNNER_ALLOW_RUNASROOT=1
          export HOME=/root

          echo "6. Setting up Neo4j backup cron..."
          APP_DIR="/root/workspace/fraud_detection"

          # Create backup directory
          mkdir -p /root/workspace/db_backup/neo4j

          # Backup script inline
          BACKUP_SCRIPT="$APP_DIR/deploy/fraud/daily_backup_neo4j.sh"
          cat > "$BACKUP_SCRIPT" << 'BACKUP_EOF'
          #!/bin/bash
          BACKUP_DIR="/root/workspace/db_backup/neo4j"
          DATE=$(date +%Y%m%d_%H%M)
          docker exec fraud_prod_neo4j neo4j-admin database dump neo4j --to-path=/data/ 2>/dev/null
          docker cp fraud_prod_neo4j:/data/neo4j.dump "$BACKUP_DIR/neo4j_$DATE.dump"
          # Keep only last 7 backups
          ls -t "$BACKUP_DIR"/neo4j_*.dump | tail -n +8 | xargs rm -f 2>/dev/null
          echo "$(date): Backup done → neo4j_$DATE.dump"
          BACKUP_EOF
          chmod +x "$BACKUP_SCRIPT"

          # Add cron (3 AM daily, avoid conflict with drug_icd at 2 AM)
          CRON_CMD="0 3 * * * $BACKUP_SCRIPT >> /var/log/neo4j_fraud_backup.log 2>&1"
          (crontab -l 2>/dev/null | grep -v "daily_backup_neo4j.sh"; echo "$CRON_CMD") | crontab -
          echo "  Cron installed: Daily backup at 3:00 AM"

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "  FRAUD DETECTION — DEPLOY COMPLETE"
          echo "=========================================="
          echo ""
          echo "  Dashboard:     http://10.14.190.28:5001"
          echo "  Neo4j Browser: http://10.14.190.28:17474"
          echo "  App API:       http://10.14.190.28:8002/docs"
          echo "  PostgreSQL:    10.14.190.28:15432"
          echo "  Qdrant:        10.14.190.28:16333"
          echo ""
          echo "  Commit: ${{ github.sha }}"
          echo "  Backup: Daily at 3:00 AM"
          echo "  Backup Dir: /root/workspace/db_backup/neo4j/"
          echo "=========================================="
