version: '3.8'

# ========================================
# Docker Compose cho STAGING Environment
# Port: 8001 (khác Prod 8000)
# ========================================

services:
  staging-web:
    build: .
    container_name: drug_icd_staging_web
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - APP_ENV=staging
      - QDRANT_MODE=server
      - QDRANT_URL=http://host.docker.internal:6335
      - UVICORN_WORKERS=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    memswap_limit: 3g
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1" ]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
