version: "3.8"

services:
  # 1. Relational DB (PostgreSQL) - For Agent 01, 04, and Orchestrator
  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fraud_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Graph DB (Neo4j) - For Agent 02 (Graph Detective)
  neo4j:
    image: neo4j:5.12.0
    container_name: fraud_neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data

  # 3. Vector DB (Qdrant) - For Agent 03 (Anomaly Hunter)
  qdrant:
    image: qdrant/qdrant:v1.6.1
    container_name: fraud_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # 4. Main Application (Python Backend)
  app:
    build: .
    container_name: fraud_app
    ports:
      - "8000:8000"
      - "8501:8501" # Streamlit
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/fraud_detection
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      # Azure Keys will be passed from local .env
    env_file:
      - .env
    depends_on:
      - postgres
      - neo4j
      - qdrant
    volumes:
      - ./src:/app/src
    command: sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000"

  # 5. SIU Dashboard
  dashboard:
    build:
      context: .
      dockerfile: deep_research/dashboard/Dockerfile
    container_name: fraud_dashboard
    ports:
      - "5000:5000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - neo4j
    volumes:
      - ./deep_research/dashboard:/app/dashboard

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
